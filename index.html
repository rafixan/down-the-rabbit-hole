<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Down the Rabbit Hole</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-deep: #080612;
      --purple-mid: #c060ff;
      --purple-dark: #8b2fc9;
      --purple-glow: rgba(160,60,240,0.4);
      --green-eye: #30e090;
      --rose: #e84898;
      --rose-deep: #a82068;
      --text-main: #e8d0ff;
      --text-muted: #9060c0;
      --text-dim: #6040a0;
    }

    html, body {
      min-height: 100%;
      background: var(--purple-deep);
      color: var(--text-main);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
    }

    body { cursor: none; }
    #cursor {
      position: fixed; width: 12px; height: 12px;
      border-radius: 50%; background: var(--purple-mid);
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, opacity 0.3s;
      box-shadow: 0 0 12px var(--purple-mid), 0 0 24px rgba(192,96,255,0.4);
      mix-blend-mode: screen;
    }

    .bg-stripes {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(45deg, transparent, transparent 22px, rgba(100,40,160,0.04) 22px, rgba(100,40,160,0.04) 44px);
    }
    .bg-vignette {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(4,1,10,0.7) 100%);
    }
    .bg-noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    main {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 5rem 1rem 7rem;
      gap: 0;
    }

    .mode-toggle {
      position: fixed; top: 1.25rem; left: 50%; transform: translateX(-50%);
      z-index: 10;
      display: flex; gap: 4px;
      background: rgba(20,8,40,0.7);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 0.5px solid #2a0a50;
      border-radius: 50px; padding: 4px;
    }
    .mode-btn {
      font-family: 'IM Fell English', serif;
      font-size: 0.85rem; font-style: italic;
      color: var(--text-muted); background: none; border: none;
      padding: 0.4rem 1.4rem; border-radius: 50px; cursor: none;
      letter-spacing: 0.06em; transition: color 0.3s, background 0.3s;
    }
    .mode-btn.active {
      color: white;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
      box-shadow: 0 0 16px rgba(160,60,240,0.4);
    }
    .mode-btn[data-mode="eat"].active {
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      box-shadow: 0 0 16px rgba(232,72,152,0.4);
    }


    .cat-container {
      width: min(380px, 90vw);
      margin-bottom: -1rem;
      animation: floatCat 6s ease-in-out infinite;
    }
    @keyframes floatCat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .eye-open { animation: blink 8s ease-in-out infinite; transform-origin: center; }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); opacity: 1; }
      95% { transform: scaleY(0.05); opacity: 0.3; }
    }
    .eye-glow-pulse { animation: eyePulse 3s ease-in-out infinite; }
    @keyframes eyePulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .smile-glow { animation: smileShimmer 4s ease-in-out infinite; }
    @keyframes smileShimmer {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.6; }
    }

    .headline { text-align: center; margin-bottom: 0.5rem; animation: fadeUp 1.4s ease 0.3s both; }
    .headline .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.6rem, 2vw, 0.75rem);
      letter-spacing: 0.45em; color: var(--text-muted);
      text-transform: uppercase; margin-bottom: 0.6rem; display: block;
    }
    .headline h1 {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 400; line-height: 1.1; color: var(--text-main); letter-spacing: 0.02em;
    }
    .headline h1 em { color: var(--purple-mid); font-style: italic; }

    .divider {
      display: flex; align-items: center; gap: 1rem;
      width: min(320px, 80vw); margin: 1.2rem 0;
      animation: fadeUp 1.4s ease 0.5s both;
    }
    .divider-line { flex: 1; height: 0.5px; background: rgba(90,48,128,0.5); }
    .divider-diamond { color: var(--text-muted); font-size: 10px; letter-spacing: 0.2em; }

    .drink-btn {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: clamp(1.3rem, 4vw, 1.7rem); font-style: italic;
      color: white; background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
      border: none; padding: 1.1rem 4rem; border-radius: 60px; cursor: none;
      letter-spacing: 0.08em; position: relative;
      transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.4s;
      box-shadow: 0 0 30px var(--purple-glow), 0 0 80px rgba(160,60,240,0.1);
      animation: fadeUp 1.4s ease 0.7s both, btnPulse 4s ease-in-out 2s infinite;
    }
    .drink-btn.eat-mode {
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      box-shadow: 0 0 30px rgba(232,72,152,0.4), 0 0 80px rgba(232,72,152,0.1);
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 30px var(--purple-glow), 0 0 80px rgba(160,60,240,0.1); }
      50% { box-shadow: 0 0 50px rgba(192,96,255,0.6), 0 0 100px rgba(160,60,240,0.2); }
    }
    .drink-btn:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(192,96,255,0.7), 0 0 120px rgba(160,60,240,0.25); }
    .drink-btn:active { transform: scale(0.97); }

    .tag {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem; letter-spacing: 0.3em;
      color: var(--text-dim); text-transform: uppercase; font-style: italic;
      border: 0.5px solid #2a0a50; padding: 0.3rem 1rem; border-radius: 2px;
      margin-top: 0.75rem; animation: fadeUp 1.4s ease 0.9s both;
    }

    .history-strip {
      width: 100%; max-width: 720px;
      margin-top: 4rem; padding-top: 2rem;
      border-top: 0.5px solid rgba(90,48,128,0.3);
      animation: fadeUp 1.4s ease 1.2s both;
    }
    .history-strip.empty { display: none; }
    .history-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem; letter-spacing: 0.4em;
      color: var(--text-muted); text-transform: uppercase;
      text-align: center; margin-bottom: 1.25rem;
    }
    .history-list {
      display: flex; flex-direction: column; gap: 0.85rem;
      max-width: 600px; margin: 0 auto;
    }
    .history-item {
      font-family: 'IM Fell English', serif; font-style: italic;
      font-size: 0.95rem; line-height: 1.5;
      color: rgba(232, 208, 255, 0.55);
      padding: 0.6rem 1rem; border-left: 1px solid rgba(140,70,200,0.3);
      transition: color 0.3s, border-color 0.3s, transform 0.3s;
    }
    .history-item:hover {
      color: var(--text-main);
      border-left-color: var(--purple-mid);
      transform: translateX(3px);
    }
    .history-item .h-source {
      display: block; margin-top: 0.3rem;
      font-family: 'Cormorant Garamond', serif; font-style: normal;
      font-size: 0.55rem; letter-spacing: 0.3em;
      color: var(--text-dim); text-transform: uppercase;
    }

    #quote-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(4, 2, 14, 0.92);
      align-items: center; justify-content: center; padding: 2rem;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    #quote-overlay.active { display: flex; }

    .quote-card {
      max-width: 600px; width: 100%; text-align: center; position: relative; padding-top: 2rem;
      animation: quoteIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes quoteIn {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .quote-ornament {
      font-family: 'IM Fell English', serif; font-size: 5rem;
      color: var(--purple-mid); line-height: 0.5; opacity: 0.3;
      margin-bottom: 1rem; display: block;
    }
    .quote-text {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: clamp(1.3rem, 4vw, 1.9rem); font-style: italic;
      line-height: 1.6; color: var(--text-main); margin-bottom: 1.5rem;
      letter-spacing: 0.01em; transition: opacity 0.3s;
    }
    .quote-attr {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem; letter-spacing: 0.35em;
      color: var(--text-muted); text-transform: uppercase;
    }
    .quote-divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem auto; width: 200px;
    }
    .quote-divider-line { flex: 1; height: 0.5px; background: rgba(90,48,128,0.5); }
    .quote-divider-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted); }

    .button-row {
      display: flex; flex-wrap: wrap; gap: 0.6rem;
      justify-content: center; margin-top: 2rem;
    }
    .btn-secondary {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem; letter-spacing: 0.35em;
      color: var(--text-muted); text-transform: uppercase;
      background: none; border: 0.5px solid #3a1060;
      padding: 0.55rem 1.5rem; border-radius: 2px; cursor: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover { color: var(--purple-mid); border-color: var(--purple-mid); }

    .close-arrow {
      position: absolute; top: -3.5rem; right: 0;
      width: 48px; height: 48px;
      color: var(--purple-mid); opacity: 0.75;
      background: none; border: none; cursor: none;
      transition: opacity 0.2s, transform 0.3s;
      padding: 0;
    }
    .close-arrow:hover { opacity: 1; transform: rotate(-30deg) scale(1.15); }
    .close-arrow svg { width: 100%; height: 100%; }

    .another-btn {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic; font-size: 1rem; color: white;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
      border: none; padding: 0.7rem 2.5rem; border-radius: 40px; cursor: none;
      letter-spacing: 0.06em; transition: transform 0.2s, box-shadow 0.2s, background 0.4s;
      box-shadow: 0 0 20px var(--purple-glow);
    }
    .another-btn.eat-mode {
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      box-shadow: 0 0 20px rgba(232,72,152,0.4);
    }
    .another-btn:hover { transform: scale(1.04); box-shadow: 0 0 40px rgba(192,96,255,0.6); }

    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(20, 8, 40, 0.95); border: 0.5px solid var(--purple-mid);
      color: var(--purple-mid);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase;
      padding: 0.75rem 1.5rem; border-radius: 4px; z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s, transform 0.4s;
      box-shadow: 0 0 20px rgba(160,60,240,0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    footer {
      position: fixed; bottom: 1.5rem; left: 0; right: 0;
      text-align: center; z-index: 2;
    }
    footer p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem; letter-spacing: 0.3em;
      color: #2a1040; text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%; background: var(--purple-mid);
      opacity: 0; animation: particleDrift linear infinite;
    }
    @keyframes particleDrift {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 0.6; transform: translateY(-20px) scale(1); }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
    }

    #saveCanvas { display: none; }

    /* ── STREAK ── */
    .streak-display {
      position: fixed; bottom: 1.5rem; left: 1.25rem; z-index: 2;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.62rem; letter-spacing: 0.18em;
      color: var(--text-muted); font-style: italic;
      pointer-events: none; opacity: 0.7;
    }

    /* ── KEYBOARD CARD ── */
    #keyboard-overlay {
      display: none; position: fixed; inset: 0; z-index: 110;
      background: rgba(4, 2, 14, 0.85);
      align-items: center; justify-content: center; padding: 2rem;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    #keyboard-overlay.active { display: flex; }
    .keyboard-card {
      max-width: 360px; width: 100%;
      background: rgba(12, 4, 28, 0.98);
      border: 0.5px solid #3a1060;
      padding: 2rem 2.5rem; border-radius: 4px;
      box-shadow: 0 0 60px rgba(100,40,180,0.2);
      animation: quoteIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .keyboard-card h2 {
      font-family: 'IM Fell English', serif; font-size: 1rem;
      font-style: italic; color: var(--text-main);
      text-align: center; margin-bottom: 1.5rem;
      letter-spacing: 0.08em; opacity: 0.8;
    }
    .shortcut-list { display: flex; flex-direction: column; gap: 0.7rem; }
    .shortcut-row {
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.04em;
    }
    .shortcut-key {
      font-family: 'IM Fell English', serif; font-style: italic;
      background: rgba(140,70,200,0.12); border: 0.5px solid #3a1060;
      color: var(--purple-mid); padding: 0.1rem 0.55rem; border-radius: 2px;
      font-size: 0.78rem; min-width: 30px; text-align: center;
    }
    .keyboard-dismiss {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.58rem; letter-spacing: 0.3em;
      color: var(--text-dim); text-transform: uppercase;
      text-align: center; margin-top: 1.5rem;
    }

    /* ── TEA CEREMONY ── */
    #tea-overlay {
      display: none; position: fixed; inset: 0; z-index: 120;
      background: rgba(4, 2, 14, 0.97);
      flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4rem 2rem 3rem;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    #tea-overlay.active { display: flex; }
    .tea-context {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem; letter-spacing: 0.35em;
      color: var(--text-muted); text-transform: uppercase;
      text-align: center; margin-bottom: 2rem; max-width: 560px;
      animation: fadeUp 1s ease both;
    }
    .tea-passage {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: clamp(1rem, 2.8vw, 1.45rem); font-style: italic;
      line-height: 1.85; color: var(--text-main);
      max-width: 640px; text-align: center; margin-bottom: 1.5rem;
      animation: fadeUp 1s ease 0.15s both;
    }
    .tea-source {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.62rem; letter-spacing: 0.35em;
      color: var(--text-muted); text-transform: uppercase;
      text-align: center; margin-bottom: 2.5rem;
      animation: fadeUp 1s ease 0.25s both;
    }
    .tea-line {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 0.9rem; font-style: italic;
      color: var(--purple-mid); opacity: 0.65;
      text-align: center; max-width: 480px;
      animation: fadeUp 1s ease 0.35s both;
    }
    .tea-timer-bar {
      position: fixed; bottom: 0; left: 0;
      height: 1.5px; background: var(--purple-mid); opacity: 0.45;
    }
    .tea-exit-hint {
      position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.58rem; letter-spacing: 0.35em;
      color: var(--text-dim); text-transform: uppercase; pointer-events: none;
    }

    /* ── TEA BUTTON ── */
    .tea-btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem; letter-spacing: 0.3em;
      color: var(--text-muted); text-transform: uppercase; font-style: italic;
      background: none; border: 0.5px solid #2a0a50;
      padding: 0.55rem 1.8rem; border-radius: 2px; cursor: none;
      margin-top: 1rem;
      transition: color 0.3s, border-color 0.3s;
      animation: fadeUp 1.4s ease 0.9s both;
    }
    .tea-btn:hover { color: var(--purple-mid); border-color: var(--purple-mid); }

    @media (max-width: 600px) {
      .mode-toggle { top: 0.75rem; }
      .sound-toggle { top: 0.75rem; right: 0.75rem; }
      main { padding-top: 5rem; }
      .history-strip { margin-top: 3rem; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div class="bg-stripes"></div>
<div class="bg-vignette"></div>
<div class="bg-noise"></div>
<div id="particles"></div>

<div class="mode-toggle">
  <button class="mode-btn active" data-mode="drink">Drink Me</button>
  <button class="mode-btn" data-mode="eat">Eat Me</button>
</div>


<main>

  <div class="headline">
    <span class="eyebrow" id="eyebrow">∙ a daily curiosity ∙</span>
    <h1>Down the<br><em>Rabbit Hole</em></h1>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond">◆</div>
    <div class="divider-line"></div>
  </div>

  <button class="drink-btn" id="drinkBtn">Drink Me</button>
  <button class="tea-btn" id="teaBtn">Sit a while.</button>

  <div class="history-strip empty" id="historyStrip">
    <div class="history-label">∙ today's sips ∙</div>
    <div class="history-list" id="historyList"></div>
  </div>

</main>

<div id="quote-overlay" role="dialog" aria-modal="true">
  <div class="quote-card">
    <button class="close-arrow" id="closeBtn" aria-label="Close">
      <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 5 A15 13 0 0 1 35 20 A14 15 0 0 1 20 34 A13 12 0 0 1 6 20 A12 13 0 0 1 20 9 A11 10 0 0 1 31 20 A9 10 0 0 1 20 29 A8 7 0 0 1 12 20 A6 7 0 0 1 20 14 A4 4 0 0 1 24 20"/>
        <polyline points="16 9 20 5 24 9"/>
      </svg>
    </button>
    <span class="quote-ornament">"</span>
    <p class="quote-text" id="quote-text"></p>
    <div class="quote-divider">
      <div class="quote-divider-line"></div>
      <div class="quote-divider-dot"></div>
      <div class="quote-divider-line"></div>
    </div>
    <p class="quote-attr" id="quote-attr">— Lewis Carroll</p>

    <div class="button-row">
      <button class="another-btn" id="anotherBtn">Another sip</button>
      <button class="btn-secondary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">∙ saved ∙</div>

<canvas id="saveCanvas" width="1080" height="1350"></canvas>

<div class="streak-display" id="streakDisplay"></div>

<div id="keyboard-overlay">
  <div class="keyboard-card">
    <h2>∙ shortcuts ∙</h2>
    <div class="shortcut-list">
      <div class="shortcut-row"><span>Drink Me</span><span class="shortcut-key">R</span></div>
      <div class="shortcut-row"><span>Eat Me</span><span class="shortcut-key">E</span></div>
      <div class="shortcut-row"><span>Save quote</span><span class="shortcut-key">S</span></div>
      <div class="shortcut-row"><span>Toggle music</span><span class="shortcut-key">M</span></div>
      <div class="shortcut-row"><span>Tea Ceremony</span><span class="shortcut-key">T</span></div>
      <div class="shortcut-row"><span>Close overlay</span><span class="shortcut-key">Esc</span></div>
      <div class="shortcut-row"><span>This card</span><span class="shortcut-key">?</span></div>
    </div>
    <div class="keyboard-dismiss">press ? or esc to close</div>
  </div>
</div>

<div id="tea-overlay">
  <p class="tea-context" id="teaContext"></p>
  <p class="tea-passage" id="teaPassage"></p>

  // ── STATE ──
  let mode = 'drink';

  // ── DAILY SEED ──
  function dayHash() {
    const d = new Date();
    return d.getFullYear() * 1000 + (d.getMonth() + 1) * 50 + d.getDate();
  }
  const dailyDrinkIndex = dayHash() % quotes.length;
  const dailyEatIndex   = dayHash() % prompts.length;

  let recentDrink = [], recentEat = [];
  let firstPullDrink = true, firstPullEat = true;

  function getNext() {
    if (mode === 'drink') {
      if (firstPullDrink) {
        firstPullDrink = false;
        recentDrink = [dailyDrinkIndex];
        return { text: quotes[dailyDrinkIndex], source: 'Lewis Carroll' };
      }
      let i;
      do { i = Math.floor(Math.random() * quotes.length); } while (recentDrink.includes(i));
      recentDrink.push(i);
      if (recentDrink.length > 3) recentDrink.shift();
      return { text: quotes[i], source: 'Lewis Carroll' };
    } else {
      if (firstPullEat) {
        firstPullEat = false;
        recentEat = [dailyEatIndex];
        return { text: prompts[dailyEatIndex], source: 'A prompt for today' };
      }
      let i;
      do { i = Math.floor(Math.random() * prompts.length); } while (recentEat.includes(i));
      recentEat.push(i);
      if (recentEat.length > 3) recentEat.shift();
      return { text: prompts[i], source: 'A prompt for today' };
    }
  }

  const historyList  = document.getElementById('historyList');
  const toast = document.getElementById('toast');

  function setMode(newMode) {
    mode = newMode;
    modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === newMode));

      drinkBtn.textContent = 'Drink Me';

      anotherBtn.classList.remove('eat-mode');
      anotherBtn.textContent = 'Another sip';
      eyebrow.textContent = '∙ a daily curiosity ∙';

      anotherBtn.classList.add('eat-mode');

      eyebrow.textContent = '∙ a daily provocation ∙';
    }
  }
  modeBtns.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));

  function showQuote() {

    overlay.classList.add('active');
    addToHistory(currentText, currentSource);
  }

  // ── HISTORY ──
  function addToHistory(text, source) {
    if (history[0] && history[0].text === text) return;
    history.unshift({ text, source });
    if (history.length > 5) history = history.slice(0, 5);
    renderHistory();
  }
  function renderHistory() {
    if (history.length === 0) { historyStrip.classList.add('empty'); return; }
    historyStrip.classList.remove('empty');
    historyList.innerHTML = history.map(h =>
      `<div class="history-item">"${h.text}"<span class="h-source">— ${h.source}</span></div>`
    ).join('');
  }

    ctx.fillText('D O W N   T H E   R A B B I T   H O L E', W/2, H - 110);

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'rabbit-hole-' + Date.now() + '.png';
      a.click();
      URL.revokeObjectURL(url);
    });

  });

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '', curY = y, lineCount = 0;
    for (let n = 0; n < words.length; n++) {
      const test = line + words[n] + ' ';
      if (ctx.measureText(test).width > maxWidth && n > 0) {
        ctx.fillText(line.trim(), x, curY);
        line = words[n] + ' ';
        curY += lineHeight;
        lineCount++;
      } else {
        line = test;
      }
    }
    ctx.fillText(line.trim(), x, curY);
    return lineCount + 1;
  }

    if (lastVisit) {
      const diff = Math.round((new Date(today) - new Date(lastVisit)) / 86400000);
      if (diff === 1) streak += 1;
      else if (diff > 1) streak = 1;
    } else {

    }

    localStorage.setItem('rh_streak', streak);

    }
  ];

  const teaOverlay  = document.getElementById('tea-overlay');
  const teaContextEl = document.getElementById('teaContext');
  const teaPassageEl = document.getElementById('teaPassage');
  const teaSourceEl  = document.getElementById('teaSource');
  const teaLineEl    = document.getElementById('teaLine');
  const teaTimerBar  = document.getElementById('teaTimerBar');
  const teaBtn       = document.getElementById('teaBtn');
  let teaActive = false, teaTimer = null, teaParticleInterval = null;

  function startTea() {
    if (teaActive) return;
    teaActive = true;
    const p = passages[Math.floor(Math.random() * passages.length)];
    teaContextEl.textContent = p.context;
    teaPassageEl.textContent = p.passage;
    teaSourceEl.textContent  = '— ' + p.source;
    teaLineEl.textContent    = p.line;
    teaOverlay.classList.add('active');
    if (!musicOn) soundToggle.click();
    teaTimerBar.style.transition = 'none';
    teaTimerBar.style.width = '100%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      teaTimerBar.style.transition = 'width 60s linear';
      teaTimerBar.style.width = '0%';
    }));
    teaParticleInterval = setInterval(spawnParticle, 150);
    teaTimer = setTimeout(endTea, 60000);
  }

  function endTea() {
    if (!teaActive) return;
    teaActive = false;
    teaOverlay.classList.remove('active');
    clearTimeout(teaTimer); teaTimer = null;
    clearInterval(teaParticleInterval); teaParticleInterval = null;
    teaTimerBar.style.transition = 'none';
    teaTimerBar.style.width = '100%';
  }

  teaBtn.addEventListener('click', startTea);
  teaOverlay.addEventListener('click', e => { if (e.target === teaOverlay) endTea(); });

  // ── KEYBOARD SHORTCUTS ──
  const keyboardOverlay = document.getElementById('keyboard-overlay');

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Escape') {
      overlay.classList.remove('active');
      keyboardOverlay.classList.remove('active');
      endTea();
      return;
    }
    if (e.key === '?') { keyboardOverlay.classList.toggle('active'); return; }
    const k = e.key.toLowerCase();
    if (k === 'r') { setMode('drink'); return; }
    if (k === 'e') { setMode('eat'); return; }
    if (k === 's' && overlay.classList.contains('active')) { saveBtn.click(); return; }
    if (k === 'm') { soundToggle.click(); return; }
    if (k === 't') { startTea(); return; }
  });
  keyboardOverlay.addEventListener('click', e => {
    if (e.target === keyboardOverlay) keyboardOverlay.classList.remove('active');
  });

  soundToggle.addEventListener('click', () => {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0;
      masterGain.connect(audioCtx.destination);
    }
    musicOn = !musicOn;
    if (musicOn) {
      audioCtx.resume();
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0.55, audioCtx.currentTime + 1.5);
      soundToggle.classList.add('on');
      soundIconOff.style.display = 'none';
      soundIconOn.style.display = 'block';
      scheduleLoop();
    } else {
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
      soundToggle.classList.remove('on');
      soundIconOff.style.display = 'block';
      soundIconOn.style.display = 'none';
      if (musicTimeoutId) { clearTimeout(musicTimeoutId); musicTimeoutId = null; }
    }
  });
</script>
</body>
</html>
